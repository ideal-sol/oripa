openapi: 3.1.1
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Oripa Admin API
  version: 2.0.0-alpha.1
  license:
    name: UNLICENSED
    identifier: LicenseRef-Proprietary
  description: >-
    共通管理画面向けAdmin API v2のContract Skeleton。Public APIとは型と認証Realmを
    共有せず、業務Endpointは後続のContract-first Taskで追加する。
  x-status: skeleton
x-oripa-surface: admin
servers:
  - url: /admin/api/v2
paths: {}
components:
  schemas:
    OpaqueId:
      $ref: ../components/common.yaml#/schemas/OpaqueId
    SemanticVersion:
      $ref: ../components/common.yaml#/schemas/SemanticVersion
    UtcDateTime:
      $ref: ../components/common.yaml#/schemas/UtcDateTime
    BusinessDate:
      $ref: ../components/common.yaml#/schemas/BusinessDate
    ProblemDetails:
      $ref: ../components/common.yaml#/schemas/ProblemDetails
  headers:
    XRequestId:
      $ref: ../components/common.yaml#/headers/XRequestId
    XOripaApiVersion:
      $ref: ../components/common.yaml#/headers/XOripaApiVersion
    IdempotencyReplayed:
      $ref: ../components/common.yaml#/headers/IdempotencyReplayed
    RetryAfter:
      $ref: ../components/common.yaml#/headers/RetryAfter
  responses:
    Problem:
      $ref: ../components/common.yaml#/responses/Problem
