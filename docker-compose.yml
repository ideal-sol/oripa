services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    working_dir: /var/www/backend
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_NAME: Oripa
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${PUBLIC_APP_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      FRONTEND_URL: ${PUBLIC_APP_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-oripa}
      DB_USERNAME: ${POSTGRES_USER:-oripa}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-oripa_password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@example.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Oripa Local}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_SECRET: ${MAILGUN_SECRET:-}
      MAILGUN_ENDPOINT: ${MAILGUN_ENDPOINT:-api.mailgun.net}
      MAILGUN_SCHEME: ${MAILGUN_SCHEME:-https}
      DISCORD_ADMIN_WEBHOOK_URL: ${DISCORD_ADMIN_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_DAILY_REPORT_TIMEZONE: ${DISCORD_DAILY_REPORT_TIMEZONE:-Asia/Tokyo}
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio_password}
      AWS_DEFAULT_REGION: ap-northeast-1
      AWS_BUCKET: ${MINIO_BUCKET:-oripa-local}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      SANCTUM_STATEFUL_DOMAINS: localhost:${FRONTEND_PORT:-3000},frontend:3000
      SESSION_DOMAIN: localhost
      CORS_ALLOWED_ORIGINS: ${PUBLIC_APP_URL:-http://localhost:${FRONTEND_PORT:-3000}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  queue:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    working_dir: /var/www/backend
    command: php artisan queue:work --sleep=3 --tries=3 --verbose
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-oripa}
      DB_USERNAME: ${POSTGRES_USER:-oripa}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-oripa_password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@example.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Oripa Local}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_SECRET: ${MAILGUN_SECRET:-}
      MAILGUN_ENDPOINT: ${MAILGUN_ENDPOINT:-api.mailgun.net}
      MAILGUN_SCHEME: ${MAILGUN_SCHEME:-https}
      DISCORD_ADMIN_WEBHOOK_URL: ${DISCORD_ADMIN_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_DAILY_REPORT_TIMEZONE: ${DISCORD_DAILY_REPORT_TIMEZONE:-Asia/Tokyo}
    depends_on:
      backend:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    working_dir: /var/www/backend
    command: sh -c 'while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done'
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-oripa}
      DB_USERNAME: ${POSTGRES_USER:-oripa}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-oripa_password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@example.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Oripa Local}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_SECRET: ${MAILGUN_SECRET:-}
      MAILGUN_ENDPOINT: ${MAILGUN_ENDPOINT:-api.mailgun.net}
      MAILGUN_SCHEME: ${MAILGUN_SCHEME:-https}
      DISCORD_ADMIN_WEBHOOK_URL: ${DISCORD_ADMIN_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_DAILY_REPORT_TIMEZONE: ${DISCORD_DAILY_REPORT_TIMEZONE:-Asia/Tokyo}
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
    working_dir: /app
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_APP_NAME: Oripa
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}/api}
      NEXT_PUBLIC_FRONTEND_URL: ${PUBLIC_APP_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      INTERNAL_API_BASE_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oripa}
      POSTGRES_USER: ${POSTGRES_USER:-oripa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oripa_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oripa} -d ${POSTGRES_DB:-oripa}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-oripa-local}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set none local/$${MINIO_BUCKET};
      "

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  backend_vendor:
  frontend_node_modules:
  postgres_data:
  redis_data:
  minio_data:
