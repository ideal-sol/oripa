name: Platform CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Test the policy gate
        run: python3 -m unittest discover -s tests/ci/policy -p 'test_*.py'

      - name: Validate repository policy
        env:
          POLICY_EVENT_NAME: ${{ github.event_name }}
          POLICY_EVENT_PATH: ${{ github.event_path }}
        run: python3 scripts/ci/policy_gate.py --repository .

  ci-gate:
    name: ci-gate
    if: always()
    needs:
      - policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require policy-gate success
        env:
          POLICY_GATE_RESULT: ${{ needs.policy-gate.result }}
        run: |
          if [ "$POLICY_GATE_RESULT" != "success" ]; then
            echo "policy-gate did not succeed"
            exit 1
          fi
