name: Platform CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Test the policy gate
        run: python3 -m unittest discover -s tests/ci/policy -p 'test_*.py'

      - name: Validate repository policy
        env:
          POLICY_EVENT_NAME: ${{ github.event_name }}
          POLICY_EVENT_PATH: ${{ github.event_path }}
        run: python3 scripts/ci/policy_gate.py --repository .

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.22.3"

      - name: Set up PHP
        uses: shivammathur/setup-php@20529878ed81ef8e78ddf08b480401e6101a850f # 2.35.3
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Verify manifests and install locked workspace dependencies
        run: |
          composer --working-dir=apps/api validate --strict --no-check-publish
          pnpm install --frozen-lockfile
          pnpm --dir legacy/v1-frontend --ignore-workspace install --frozen-lockfile

      - name: Run quality structure and unit checks
        run: |
          python3 -m unittest discover -s tests/ci/quality -p 'test_*.py'
          python3 scripts/ci/quality_gate.py --repository .

      - name: Validate OpenAPI contracts and committed bundles
        run: |
          pnpm openapi:test
          pnpm openapi:check

      - name: Validate Storefront Client Alpha
        run: pnpm storefront:check

      - name: Validate Site Schema Alpha
        run: pnpm site-schema:check

      - name: Typecheck legacy frontend
        run: pnpm --dir legacy/v1-frontend --ignore-workspace typecheck

      - name: Validate V2 Admin Skeleton
        run: |
          pnpm admin:typecheck
          pnpm admin:lint
          pnpm admin:build

      - name: Compare legacy frontend lint findings with the exact baseline
        run: |
          set +e
          (
            cd legacy/v1-frontend
            pnpm --ignore-workspace exec eslint . --format json > "$RUNNER_TEMP/eslint.json"
          )
          eslint_status=$?
          set -e
          echo "eslint raw exit status: $eslint_status"
          python3 scripts/ci/lint_baseline.py \
            --report "$RUNNER_TEMP/eslint.json" \
            --baseline .ci/baselines/frontend-eslint.json

      - name: Verify tracked generated output and whitespace
        run: |
          git diff --check
          git diff --exit-code

  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.22.3"

      - name: Set up PHP
        uses: shivammathur/setup-php@20529878ed81ef8e78ddf08b480401e6101a850f # 2.35.3
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Collect dependency audits
        run: |
          set +e
          composer --working-dir=apps/api audit --locked --format=json > "$RUNNER_TEMP/composer-audit.json"
          composer_status=$?
          pnpm audit --audit-level low --json > "$RUNNER_TEMP/workspace-pnpm-audit.json"
          workspace_pnpm_status=$?
          pnpm --dir legacy/v1-frontend --ignore-workspace audit \
            --audit-level low --json > "$RUNNER_TEMP/pnpm-audit.json"
          pnpm_status=$?
          set -e
          echo "composer audit raw exit status: $composer_status"
          echo "workspace pnpm audit raw exit status: $workspace_pnpm_status"
          echo "pnpm audit raw exit status: $pnpm_status"

      - name: Run security checks
        run: |
          python3 -m unittest discover -s tests/ci/security -p 'test_*.py'
          python3 scripts/ci/security_gate.py \
            --repository . \
            --baseline .ci/baselines/dependency-advisories.json \
            --composer-audit "$RUNNER_TEMP/composer-audit.json" \
            --pnpm-audit "$RUNNER_TEMP/pnpm-audit.json" \
            --workspace-pnpm-audit "$RUNNER_TEMP/workspace-pnpm-audit.json"

  integration-gate:
    name: integration-gate
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: oripa_test
          POSTGRES_USER: oripa_test
          POSTGRES_PASSWORD: integration_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oripa_test -d oripa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_DATABASE: oripa_test
      DB_USERNAME: oripa_test
      DB_PASSWORD: integration_test_password
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      FILESYSTEM_DISK: local
      MAIL_MAILER: array
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.22.3"

      - name: Set up PHP
        uses: shivammathur/setup-php@20529878ed81ef8e78ddf08b480401e6101a850f # 2.35.3
        with:
          php-version: "8.4"
          extensions: pdo_pgsql
          tools: composer:v2
          coverage: none

      - name: Install locked dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          composer --working-dir=apps/api install --no-interaction --prefer-dist --no-progress
          pnpm install --frozen-lockfile
          pnpm --dir legacy/v1-frontend --ignore-workspace install --frozen-lockfile

      - name: Apply migrations to the ephemeral database
        run: php apps/api/artisan migrate --no-interaction

      - name: Run backend tests against the exact legacy baseline
        run: |
          set +e
          (
            cd apps/api
            php artisan test --log-junit "$RUNNER_TEMP/backend-tests.xml"
          )
          backend_status=$?
          set -e
          echo "backend test raw exit status: $backend_status"
          python3 scripts/ci/backend_test_baseline.py \
            --report "$RUNNER_TEMP/backend-tests.xml" \
            --baseline .ci/baselines/backend-tests.json

      - name: Validate Site Template policy
        run: |
          python3 -m unittest discover -s tests/ci/site-template -p 'test_*.py'
          python3 scripts/ci/site_template_gate.py \
            --template tests/ci/site-template/fixtures/positive
          if python3 scripts/ci/site_template_gate.py \
            --template tests/ci/site-template/fixtures/negative; then
            echo "Negative Site Template fixture unexpectedly passed"
            exit 1
          fi
          echo "Negative Site Template fixture failed as required"

      - name: Build and typecheck legacy frontend
        run: |
          pnpm --dir legacy/v1-frontend --ignore-workspace typecheck
          pnpm --dir legacy/v1-frontend --ignore-workspace build

      - name: Build and validate V2 Admin Skeleton
        run: |
          pnpm admin:typecheck
          pnpm admin:lint
          pnpm admin:build

      - name: Generate, build, and test Storefront Client Alpha
        run: pnpm storefront:check

      - name: Generate, build, and test Site Schema Alpha
        run: pnpm site-schema:check

      - name: Validate contracts, manifests, and Compose
        run: |
          python3 scripts/ci/quality_gate.py --repository .
          pnpm openapi:check
          docker compose config --quiet
          docker compose -f docker-compose.v2.yml config --quiet

      - name: Run ephemeral V2 Skeleton smoke test
        run: |
          project="mig023-v2-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          compose=(docker compose -p "$project" -f docker-compose.v2.yml)
          cleanup() {
            "${compose[@]}" down -v --remove-orphans
          }
          diagnostics() {
            "${compose[@]}" ps >&2
            "${compose[@]}" logs --no-color --tail 100 |
              sed 's/^/V2_SMOKE_ERROR_DIAGNOSTIC: /' >&2
          }
          wait_for_endpoint() {
            local service="$1"
            shift
            for _ in $(seq 1 60); do
              if "${compose[@]}" exec -T "$service" "$@"; then
                return 0
              fi
              sleep 5
            done
            echo "V2_SMOKE_ERROR_DIAGNOSTIC: endpoint timeout: $service" >&2
            diagnostics
            return 1
          }
          trap cleanup EXIT
          COMPOSE_BAKE=false "${compose[@]}" up --build -d
          wait_for_endpoint api \
            curl --fail --silent http://localhost:8000/api/health \
            > "$RUNNER_TEMP/v2-api-health.json"
          wait_for_endpoint admin \
            wget --quiet --output-document=- http://127.0.0.1:3000/api/health \
            > "$RUNNER_TEMP/v2-admin-health.json"
          for service in api admin postgres redis; do
            container="$("${compose[@]}" ps -q "$service")"
            if [ -z "$container" ] ||
              [ "$(docker inspect --format '{{.State.Health.Status}}' "$container")" != "healthy" ]; then
              diagnostics
              exit 1
            fi
          done
          cleanup
          trap - EXIT
          if docker ps -a --filter "label=com.docker.compose.project=$project" \
            --format '{{.ID}}' | grep -q .; then
            echo "V2 Skeleton container cleanup failed"
            exit 1
          fi
          if docker network ls --filter "label=com.docker.compose.project=$project" \
            --format '{{.ID}}' | grep -q .; then
            echo "V2 Skeleton network cleanup failed"
            exit 1
          fi
          if docker volume ls --filter "label=com.docker.compose.project=$project" \
            --format '{{.Name}}' | grep -q .; then
            echo "V2 Skeleton volume cleanup failed"
            exit 1
          fi

      - name: Verify no tracked generated changes
        run: |
          git diff --check
          git diff --exit-code

  ci-gate:
    name: ci-gate
    if: always()
    needs:
      - policy-gate
      - quality-gate
      - security-gate
      - integration-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require policy-gate success
        env:
          POLICY_GATE_RESULT: ${{ needs.policy-gate.result }}
          QUALITY_GATE_RESULT: ${{ needs.quality-gate.result }}
          SECURITY_GATE_RESULT: ${{ needs.security-gate.result }}
          INTEGRATION_GATE_RESULT: ${{ needs.integration-gate.result }}
        run: |
          for result in \
            "$POLICY_GATE_RESULT" \
            "$QUALITY_GATE_RESULT" \
            "$SECURITY_GATE_RESULT" \
            "$INTEGRATION_GATE_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "A required gate did not succeed"
              exit 1
            fi
          done
