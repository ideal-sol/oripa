name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # These exact pre-existing V1 advisories remain enforced by the
          # package/version/path-specific, expiring security-gate baseline.
          allow-ghsas: >-
            GHSA-3jxr-9vmj-r5cp,
            GHSA-52cp-r559-cp3m,
            GHSA-f88m-g3jw-g9cj,
            GHSA-6gpp-xcg3-4w24,
            GHSA-m99w-x7hq-7vfj,
            GHSA-89xv-2m56-2m9x,
            GHSA-p9j2-gv94-2wf4
