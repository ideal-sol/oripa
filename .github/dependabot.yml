version: 2
updates:
  - package-ecosystem: composer
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      composer-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
