# V2 development and ephemeral verification only. This is never a Production deployment.
services:
  api:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      APP_DEBUG: "false"
      APP_ENV: ${V2_APP_ENV:?V2_APP_ENV is required}
      APP_KEY: ${V2_APP_KEY:?V2_APP_KEY is required}
      APP_URL: http://api:8000
      CACHE_STORE: redis
      DB_CONNECTION: pgsql
      DB_DATABASE: ${V2_DB_DATABASE:?V2_DB_DATABASE is required}
      DB_HOST: ${V2_DB_HOST:?V2_DB_HOST is required}
      DB_PASSWORD: ${V2_DB_PASSWORD:?V2_DB_PASSWORD is required}
      DB_PORT: ${V2_DB_PORT:?V2_DB_PORT is required}
      DB_USERNAME: ${V2_DB_USERNAME:?V2_DB_USERNAME is required}
      FILESYSTEM_DISK: local
      LOG_CHANNEL: stderr
      QUEUE_CONNECTION: sync
      REDIS_HOST: ${V2_REDIS_HOST:?V2_REDIS_HOST is required}
      REDIS_PASSWORD: ${V2_REDIS_PASSWORD:?V2_REDIS_PASSWORD is required}
      REDIS_PORT: ${V2_REDIS_PORT:?V2_REDIS_PORT is required}
      SESSION_DRIVER: array
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s
    networks:
      - v2_private

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    networks:
      - v2_private

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${V2_DB_DATABASE:?V2_DB_DATABASE is required}
      POSTGRES_PASSWORD: ${V2_DB_PASSWORD:?V2_DB_PASSWORD is required}
      POSTGRES_USER: ${V2_DB_USERNAME:?V2_DB_USERNAME is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - v2_postgres:/var/lib/postgresql/data
    networks:
      - v2_private

  redis:
    image: redis:7-alpine
    command:
      - /bin/sh
      - -ec
      - |
        umask 077
        printf 'requirepass %s\nsave ""\nappendonly no\n' "$$REDIS_PASSWORD" > /run/redis-v2.conf
        exec redis-server /run/redis-v2.conf
    environment:
      REDIS_PASSWORD: ${V2_REDIS_PASSWORD:?V2_REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - v2_redis:/data
    networks:
      - v2_private

networks:
  v2_private:
    internal: true

volumes:
  v2_postgres:
  v2_redis:
